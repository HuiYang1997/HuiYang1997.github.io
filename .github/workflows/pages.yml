name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Keep Pages deployments serialized, but let an active production deployment finish.
# GitHub's Pages starter workflows recommend this to avoid cancelling deployments
# while the Pages service is still finalizing the previous artifact.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_attempt_1.outputs.page_url || steps.deploy_attempt_2.outputs.page_url || steps.deploy_attempt_3.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retrying deployment
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 60

      - name: Retry GitHub Pages deployment
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before final deployment retry
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 120

      - name: Final GitHub Pages deployment retry
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v5
